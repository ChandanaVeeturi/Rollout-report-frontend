<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Rollout Report</title>
    <meta name="description" content="Expert reviews of recently released software products. Find out what's worth using, what to watch, and what to skip." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://therolloutreport.com/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://therolloutreport.com/" />
    <meta property="og:site_name" content="The Rollout Report" />
    <meta property="og:title" content="The Rollout Report" />
    <meta property="og:description" content="Expert reviews of recently released software products. Find out what's worth using, what to watch, and what to skip." />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="The Rollout Report" />
    <meta name="twitter:description" content="Expert reviews of recently released software products. Find out what's worth using, what to watch, and what to skip." />

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Rollout Report",
      "url": "https://therolloutreport.com/",
      "description": "Expert reviews of recently released software products.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://therolloutreport.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
